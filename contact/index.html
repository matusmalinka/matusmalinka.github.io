<title>contact // malinka.online</title>
<style>
  :root {
    --ground:   #0a0f0c;
    --text:     #8fa99a;
    --text-dim: #54685c;
    --accent:   #2fe08d;
    --accent-2: #d8a93a;
    --danger:   #e0533f;
    --mono: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", "DejaVu Sans Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--ground);
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.65;
    letter-spacing: 0.02em;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ---- CRT overlays ---- */
  .crt::before, .crt::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 50;
  }
  .crt::before {
    background: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.28) 3px, rgba(0,0,0,0.28) 4px);
    mix-blend-mode: multiply;
    opacity: 0.55;
  }
  .crt::after {
    background:
      radial-gradient(120% 90% at 50% 45%, rgba(47,224,141,0.05), rgba(0,0,0,0) 55%),
      radial-gradient(140% 120% at 50% 50%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.85) 100%);
  }

  .flicker { animation: flicker 6s infinite steps(1); }
  @keyframes flicker {
    0%,100%{opacity:1} 97%{opacity:1} 97.3%{opacity:.72}
    97.6%{opacity:1} 98.6%{opacity:.9} 98.9%{opacity:1}
  }

  /* ---- centered layout ---- */
  .stage {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: grid; place-items: center;
    padding: clamp(20px, 5vw, 64px);
  }
  .terminal { width: 100%; max-width: 720px; }

  .winbar {
    display: flex; align-items: center; gap: 14px;
    color: var(--text-dim);
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    border-bottom: 1px solid rgba(143,169,154,0.14);
    padding-bottom: 10px; margin-bottom: 24px;
  }
  .dots { display: inline-flex; gap: 7px; }
  .dots i { width: 9px; height: 9px; border-radius: 50%; background: rgba(143,169,154,0.25); }
  .dots i:first-child { background: var(--danger); opacity: 0.85; }
  .winbar .host { margin-left: auto; }

  .line { white-space: pre-wrap; word-break: break-word; margin: 0; }
  .prompt { color: var(--accent-2); }
  .ok { color: var(--accent); }

  .title {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: #d7e7df; margin: 18px 0 4px;
    text-shadow: 0 0 18px rgba(47,224,141,0.18);
  }
  .rule {
    width: clamp(120px, 28%, 240px); height: 1px;
    background: linear-gradient(90deg, var(--accent), rgba(47,224,141,0));
    margin: 10px 0 26px;
  }

  /* ---- contact fields ---- */
  .fields { display: grid; gap: 12px; margin: 0 0 30px; }
  .field { display: grid; grid-template-columns: 96px 1fr; gap: 16px; align-items: baseline; }
  .field dt {
    color: var(--text-dim); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    margin: 0;
  }
  .field dd { margin: 0; color: var(--text); }
  .field a {
    color: var(--accent); text-decoration: none;
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color .15s ease, text-shadow .15s ease, color .15s ease;
  }
  .field a:hover, .field a:focus-visible {
    color: #d7e7df; border-bottom-color: var(--accent);
    text-shadow: 0 0 10px rgba(47,224,141,0.5); outline: none;
  }
  .field a:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }

  /* ---- social icons ---- */
  .socials { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; }
  .socials a {
    width: 46px; height: 46px;
    display: grid; place-items: center;
    border: 1px solid rgba(47,224,141,0.22);
    border-radius: 7px;
    color: var(--text);
    transition: color .15s ease, border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  .socials a:hover, .socials a:focus-visible {
    color: #d7e7df;
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(47,224,141,0.3);
    transform: translateY(-2px);
    outline: none;
  }
  .socials a:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }
  .socials svg { width: 20px; height: 20px; fill: currentColor; display: block; }

  .nav { display: flex; gap: 24px; margin-top: 6px; }
  .nav a {
    color: var(--accent); text-decoration: none; letter-spacing: 0.05em;
    border-bottom: 1px solid transparent; padding-bottom: 2px;
    transition: border-color .15s ease, color .15s ease, text-shadow .15s ease;
  }
  .nav a::before { content: "‹ "; color: var(--text-dim); }
  .nav a:hover, .nav a:focus-visible {
    color: #d7e7df; border-bottom-color: var(--accent);
    text-shadow: 0 0 10px rgba(47,224,141,0.5);
  }
  .nav a:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }

  .cursor {
    display: inline-block; width: 0.62em; height: 1.05em;
    background: var(--accent); box-shadow: 0 0 10px rgba(47,224,141,0.6);
    transform: translateY(0.18em);
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  .statusbar {
    display: flex; flex-wrap: wrap; gap: 8px 22px; align-items: center;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim);
    border-top: 1px solid rgba(143,169,154,0.14);
    padding-top: 16px; margin-top: 40px;
  }
  .statusbar .tag { color: var(--danger); letter-spacing: 0.2em; }
  .statusbar .spacer { margin-left: auto; }

  /* Hide animated blocks until JS reveals them (no-JS: fully visible) */
  html.js #screen > * { visibility: hidden; }
  html.js #screen > *.shown { visibility: visible; }
  .reveal-in { animation: revealIn 0.5s ease both; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    .flicker { animation: none; }
    .cursor  { animation: none; opacity: 1; }
  }
  /* ---- shared top navigation ---- */
  .topnav {
    display: flex; flex-wrap: wrap; gap: 8px 24px;
    padding-bottom: 16px; margin-bottom: 22px;
    border-bottom: 1px solid rgba(143,169,154,0.14);
  }
  .topnav a {
    color: var(--accent); text-decoration: none; letter-spacing: 0.05em;
    border-bottom: 1px solid transparent; padding-bottom: 2px;
    transition: border-color .15s ease, color .15s ease, text-shadow .15s ease;
  }
  .topnav a::before { content: "› "; color: var(--text-dim); }
  .topnav a:hover, .topnav a:focus-visible {
    color: #d7e7df; border-bottom-color: var(--accent);
    text-shadow: 0 0 10px rgba(47,224,141,0.5); outline: none;
  }
  .topnav a:focus-visible { outline: 1px dashed var(--accent); outline-offset: 4px; }
  .topnav a[aria-current="page"] { color: #d7e7df; border-bottom-color: var(--accent); }

  /* ---- mobile ---- */
  @media (max-width: 640px) {
    body { font-size: 15px; }
    .stage { padding: 16px 14px 28px; align-content: start; place-items: start stretch; }
    .winbar { gap: 10px; font-size: 10px; letter-spacing: 0.1em; }
    .winbar .host { display: none; }
    .title { letter-spacing: 0.08em; font-size: clamp(26px, 10vw, 40px); }
    .field {
      grid-template-columns: 1fr;
      gap: 4px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(143,169,154,0.08);
    }
    .field:last-child { border-bottom: none; }
    .field a { word-break: break-all; }
    .socials a { width: 48px; height: 48px; }
    .topnav { gap: 10px 18px; }
    .topnav a { min-height: 44px; display: inline-flex; align-items: center; }
    .statusbar { gap: 6px 14px; font-size: 11px; letter-spacing: 0.08em; }
    .statusbar .spacer { margin-left: 0; width: 100%; margin-top: 4px; }
  }
</style>

<script>
  // Commands type out; the rest reveals line by line. Enhancement only —
  // all content is in the DOM and shows if JS is off.
  (function () {
    var blocks = Array.prototype.slice.call(document.querySelectorAll("#screen > *"));
    var cmd  = document.getElementById("cmd");
    var cmd2 = document.getElementById("cmd2");
    var cmd2Line = cmd2.parentNode;
    var cmd2Index = blocks.indexOf(cmd2Line);
    var cmdText = cmd.textContent;
    var cmd2Text = cmd2.textContent;
    cmd.textContent = "";
    cmd2.textContent = "";

    function type(el, text, speed, done) {
      el.textContent = "";
      var node = document.createTextNode("");
      var cur = document.createElement("span");
      cur.className = "cursor"; cur.setAttribute("aria-hidden", "true");
      el.appendChild(node); el.appendChild(cur);
      var i = 0;
      (function step() {
        node.nodeValue = text.slice(0, i);
        if (i++ <= text.length) setTimeout(step, speed + Math.random() * 35);
        else el.removeChild(cur);
      })();
      setTimeout(done, text.length * speed + 200);
    }

    function revealRange(start, end, done) {
      var i = start;
      (function next() {
        if (i >= end) { if (done) done(); return; }
        blocks[i].classList.add("shown", "reveal-in");
        i++;
        setTimeout(next, 220);
      })();
    }

    blocks[0].classList.add("shown");
    setTimeout(function () {
      type(cmd, cmdText, 70, function () {
        revealRange(1, cmd2Index, function () {
          setTimeout(function () {
            cmd2Line.classList.add("shown");
            type(cmd2, cmd2Text, 75, function () {
              revealRange(cmd2Index + 1, blocks.length);
            });
          }, 500);
        });
      });
    }, 350);
  })();
</script>
